<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Niram</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: var(--figma-color-bg, #ffffff);
        --bg-hover: var(--figma-color-bg-hover, rgba(0, 0, 0, 0.06));
        --bg-secondary: var(--figma-color-bg-secondary, #f5f5f5);
        --fg: var(--figma-color-text, #1e1e1e);
        --muted: var(--figma-color-text-secondary, #8c8c8c);
        --border: var(--figma-color-border, #e6e6e6);
        --border-strong: var(--figma-color-border-strong, #cdcdcd);
        --accent: var(--figma-color-bg-brand, #0d99ff);
        --accent-fg: var(--figma-color-text-onbrand, #ffffff);
        --danger: var(--figma-color-text-danger, #e03e3e);
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        font-family:
          Inter,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        font-size: 11px;
        line-height: 16px;
        color: var(--fg);
        background: var(--bg);
        display: flex;
        flex-direction: column;
        -webkit-font-smoothing: antialiased;
      }
      main {
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        flex: 1;
      }
      header {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      h1 {
        margin: 0;
        font-size: 11px;
        font-weight: 600;
      }
      p.subtitle {
        margin: 0;
        color: var(--muted);
      }

      /* Input */
      input[type="text"] {
        width: 100%;
        height: 28px;
        padding: 0 8px;
        border: 1px solid transparent;
        border-radius: 5px;
        background: var(--bg-secondary);
        color: var(--fg);
        font: inherit;
        outline: none;
        transition: border-color 80ms ease;
      }
      input[type="text"]:hover {
        border-color: var(--border-strong);
      }
      input[type="text"]:focus {
        border-color: var(--accent);
        background: var(--bg);
      }
      input[type="text"]::placeholder {
        color: var(--muted);
      }

      /* Section blocks */
      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .field-label {
        color: var(--muted);
        font-weight: 500;
      }
      .field-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      /* Icon button (shuffle) */
      .icon-button {
        appearance: none;
        height: 22px;
        padding: 0 8px;
        display: inline-flex;
        align-items: center;
        gap: 4px;
        border: 1px solid var(--border);
        border-radius: 5px;
        background: var(--bg);
        color: var(--fg);
        font: inherit;
        font-weight: 500;
        cursor: pointer;
        transition:
          background 80ms ease,
          border-color 80ms ease;
      }
      .icon-button:hover:not(:disabled) {
        background: var(--bg-hover);
        border-color: var(--border-strong);
      }
      .icon-button:disabled {
        opacity: 0.4;
        cursor: default;
      }

      /* Preset chips */
      .presets-list {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .preset-badge {
        appearance: none;
        display: inline-flex;
        align-items: center;
        height: 24px;
        padding: 0 10px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--fg);
        font: inherit;
        font-weight: 500;
        cursor: pointer;
        white-space: nowrap;
        transition:
          border-color 80ms ease,
          background 80ms ease;
      }
      .preset-badge:hover:not(:disabled) {
        border-color: var(--border-strong);
        background: var(--bg-hover);
      }
      .preset-badge:disabled {
        opacity: 0.4;
        cursor: default;
      }

      /* Footer / actions */
      footer {
        margin-top: auto;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .status {
        min-height: 16px;
        color: var(--muted);
        word-break: break-word;
      }
      .status.error {
        color: var(--danger);
      }
      .status.done {
        color: var(--fg);
      }
      .progress {
        height: 2px;
        background: var(--bg-secondary);
        border-radius: 999px;
        overflow: hidden;
        opacity: 0;
        transition: opacity 120ms ease;
      }
      .progress.visible {
        opacity: 1;
      }
      .progress > .bar {
        display: block;
        height: 100%;
        width: 0%;
        background: var(--accent);
        border-radius: inherit;
        transition: width 200ms ease;
      }
      .progress.indeterminate > .bar {
        width: 35%;
        animation: indeterminate 1.1s ease-in-out infinite;
      }
      @keyframes indeterminate {
        0% {
          transform: translateX(-100%);
        }
        100% {
          transform: translateX(300%);
        }
      }
      .actions {
        display: flex;
        gap: 8px;
      }
      button.btn {
        appearance: none;
        height: 32px;
        padding: 0 14px;
        border-radius: 6px;
        border: 1px solid var(--border-strong);
        background: var(--bg);
        color: var(--fg);
        font: inherit;
        font-weight: 500;
        cursor: pointer;
        transition: background 80ms ease;
      }
      button.btn:hover:not(:disabled) {
        background: var(--bg-hover);
      }
      button.btn.primary {
        flex: 1;
        background: var(--accent);
        border-color: var(--accent);
        color: var(--accent-fg);
      }
      button.btn.primary:hover:not(:disabled) {
        filter: brightness(0.94);
        background: var(--accent);
      }
      button.btn.primary:disabled {
        opacity: 0.4;
        cursor: default;
      }

      a {
        color: var(--accent);
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Niram</h1>
        <p class="subtitle">
          shadcn/ui design system generator. Paste a
          <a href="https://ui.shadcn.com/create" target="_blank" rel="noopener"
            >shadcn preset</a
          >
          code to build variables, components, and blocks.
        </p>
      </header>

      <div class="field">
        <input
          id="preset"
          type="text"
          placeholder="b3HGM2E529 or --preset b3HGM2E529"
          autocomplete="off"
          spellcheck="false"
        />
      </div>

      <div class="field" id="presets">
        <div class="field-head">
          <span class="field-label">Presets</span>
          <button id="shuffle" type="button" class="icon-button">
            🎲 Shuffle
          </button>
        </div>
        <div class="presets-list" id="presets-list"></div>
      </div>

      <footer>
        <div id="status" class="status"></div>
        <div id="progress" class="progress" aria-hidden="true">
          <span class="bar"></span>
        </div>
        <div class="actions">
          <button id="generate" class="btn primary" type="button" disabled>
            Generate
          </button>
        </div>
      </footer>
    </main>
    <!-- INJECT_UI_SCRIPT -->
  </body>
</html>
